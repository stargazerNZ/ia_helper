<?xml version="1.0" encoding="UTF-8"?>
<!-- IA Helper app icon: a classical archive building with a download badge.
     Flat GNOME-ish style on a 128x128 grid. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <!-- subtle top highlight -->
  <rect x="8" y="8" width="112" height="56" rx="26" fill="#ffffff" opacity="0.06"/>

  <!-- archive building -->
  <g fill="#ffffff">
    <!-- pediment -->
    <path d="M 64 24 L 106 46 L 106 50 L 22 50 L 22 46 Z"/>
    <!-- architrave -->
    <rect x="26" y="54" width="76" height="6" rx="2"/>
    <!-- columns -->
    <rect x="30" y="64" width="9" height="28" rx="2.5"/>
    <rect x="49.5" y="64" width="9" height="28" rx="2.5"/>
    <rect x="69" y="64" width="9" height="28" rx="2.5"/>
    <rect x="88.5" y="64" width="9" height="28" rx="2.5"/>
    <!-- stylobate and steps -->
    <rect x="26" y="96" width="76" height="6" rx="2"/>
    <rect x="20" y="105" width="88" height="7" rx="2.5"/>
  </g>

  <!-- download badge -->
  <circle cx="91" cy="89" r="23" fill="#26a269" stroke="#ffffff" stroke-width="4"/>
  <path d="M 91 78 L 91 97 M 83 89 L 91 98 L 99 89"
        stroke="#ffffff" stroke-width="6" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
</svg>
